name: Update Profile README

on:
  schedule:
    - cron: '0 6 * * *'  # Daily 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout profile repo
        uses: actions/checkout@v4
        with:
          repository: ngampus/ngampus
          token: ${{ secrets.GH_PAT }}
          path: profile

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: profile/package-lock.json

      - name: Install dependencies
        run: |
          cd profile
          npm ci --prefer-offline --no-audit 2>/dev/null || npm install --prefer-offline --no-audit

      - name: Generate README with stats
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
        run: |
          cd profile
          npx github-readme-stats --username=ngampus --theme=github_dark --hide_rank=true --show_icons=true > stats.svg 2>/dev/null || echo "Stats generation failed"
          npx github-contribution-graph --username=ngampus > contrib.svg 2>/dev/null || echo "Graph generation failed"
          if [ -n "$WAKATIME_API_KEY" ]; then
            npx waka-readme-stats --username=ngampus --theme=github-dark > waka.svg 2>/dev/null || echo "WakaTime failed"
          fi
          node scripts/build-readme.js

      - name: Commit and push
        run: |
          cd profile
          git config user.name "ngampus-bot"
          git config user.email "bot@ngampus.dev"
          git add README.md
          if ! git diff --cached --quiet; then
            git commit -m "chore: update profile stats $(date +%F)"
            git push
          else
            echo "No changes to commit"
          fi